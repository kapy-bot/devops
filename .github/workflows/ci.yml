name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v4  
        with:
          python-version: '3.12'
      - name: Install dependencies and lint
        run: |
          pip install -r backend/requirements.txt
          pip install ruff
          ruff check backend/ 
      - name: Build Docker image
        run: docker build -t todo-backend:ci ./backend
      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: todo-backend:ci
          severity: HIGH,CRITICAL
          exit-code: '1'

  frontend:
    runs-on: ubuntu-latest
    steps:
       - name: Checkout code
         uses: actions/checkout@v7
       - name: Set up Node.js
         uses: actions/setup-node@v4
         with:
           node-version: '20'  
       - name: Install dependencies and build
         working-directory: frontend
         run: |
           npm install
           npm run build 
       - name: Build Docker image
         run: docker build -t todo-frontend:ci ./frontend
       - name: Scan image for vulnerabilities
         uses: aquasecurity/trivy-action@0.24.0
         with:
           image-ref: todo-frontend:ci
           severity: HIGH,CRITICAL
           exit-code: '1'

  deploy:
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push images
        run: |
          az acr login --name todoapph98su6
          docker build -t todoapph98su6.azurecr.io/todo-backend:${{ github.sha }} ./backend
          docker push todoapph98su6.azurecr.io/todo-backend:${{ github.sha }}
          docker build -t todoapph98su6.azurecr.io/todo-frontend:${{ github.sha }} ./frontend
          docker push todoapph98su6.azurecr.io/todo-frontend:${{ github.sha }}

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Get AKS credentials
        run: az aks get-credentials --resource-group rg-todoapp --name aks-todoapp --overwrite-existing

      - name: Deploy with Helm
        run: |
          helm upgrade --install todo-app helm/todo-app \
            --namespace todo-app \
            --set backend.image.tag=${{ github.sha }} \
            --set frontend.image.tag=${{ github.sha }}
