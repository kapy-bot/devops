server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing: unknown paths fall back to index.html instead of 404ing.
    location / {
        try_files $uri /index.html;
    }

    # Same-origin API calls: nginx forwards to the backend container by its
    # docker-compose service name, so the browser never needs to know the
    # backend's address and CORS never comes into play.
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
